{% extends "base.html" %}

{% block content %}
<h1>Sentiment Analysis</h1>

<form method="POST">
    <textarea name="review_text" placeholder="Enter customer review"></textarea>
    <button type="submit">Analyze</button>
</form>

{% if result %}
<div class="card">
    <h3>Result:</h3>
    <pre>{{ result }}</pre>
</div>
{% endif %}

{% endblock %}
