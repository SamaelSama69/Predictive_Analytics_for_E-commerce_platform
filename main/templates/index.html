<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analyzer</title>
</head>
<body>
    <h1>Sentiment Analysis</h1>

    <form method="POST" action="/sentiment">
        <textarea name="review_text" placeholder="Enter your review here..."></textarea>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <h2>Result: {{ result }}</h2>
    {% endif %}
</body>
</html>
